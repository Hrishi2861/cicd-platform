apiVersion: v1
kind: List
metadata: {}
items:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: api-gateway
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/cicd-platform.git
        targetRevision: HEAD
        path: charts/api-gateway
      destination:
        server: https://kubernetes.default.svc
        namespace: cicd-platform
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: user-service
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/cicd-platform.git
        targetRevision: HEAD
        path: charts/user-service
      destination:
        server: https://kubernetes.default.svc
        namespace: cicd-platform
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: order-service
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/cicd-platform.git
        targetRevision: HEAD
        path: charts/order-service
      destination:
        server: https://kubernetes.default.svc
        namespace: cicd-platform
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
