# Prometheus configuration for the local docker-compose stack.
# The Kubernetes/EKS deployment uses prometheus.yml (pod service discovery);
# in Compose we scrape the services by their container DNS names instead.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8082"]
