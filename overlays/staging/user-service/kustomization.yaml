apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../charts/user-service/templates/deployment.yaml
  - ../../charts/user-service/templates/service.yaml

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  - target:
      kind: Deployment
      name: user-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: user-service:staging
